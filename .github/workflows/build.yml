name: Build APK

on:
  push:
    branches: [ main ]
  # Optional: Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        # ✅ CRITICAL: Changed from v3 to v4
        uses: actions/upload-artifact@v4
        with:
          name: payment-manager-debug-apk
          # ✅ v4 requires a specific path, not a wildcard folder.
          #    Change this to match your actual APK file name.
          #    Usually it's 'app-debug.apk'
          path: app/build/outputs/apk/debug/app-debug.apk
